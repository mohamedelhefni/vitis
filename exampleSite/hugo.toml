baseURL = "https://vitis-demo.netlify.app/"
title = "Vitis"
languageCode = "en"
defaultContentLanguage = "en"

# Enable useful features
enableRobotsTXT = false
enableEmoji = true
enableGitInfo = true

# Outputs
[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML", "RSS"]
taxonomy = ["HTML", "RSS"]
term = ["HTML", "RSS"]

# Taxonomies
[taxonomies]
tag = "tags"
series = "series"

# Sitemap
[sitemap]
changefreq = "weekly"
priority = 0.5
filename = "sitemap.xml"

# Hugo Modules
[module]
  [[module.imports]]
    path = "github.com/mohamedelhefni/vitis"

# Navigation Menu
[menu]
[[menu.main]]
identifier = "home"
name = "Home"
url = "/"
weight = 10

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts"
weight = 20

[[menu.main]]
identifier = "series"
name = "Series"
url = "/series"
weight = 25

[[menu.main]]
identifier = "projects"
name = "Projects"
url = "/projects"
weight = 27

[[menu.main]]
identifier = "graph"
name = "Graph"
url = "/graph"
weight = 30

# Site Parameters
[params]
# Site Info
description = "Vitis - A modern Hugo theme designed as a digital garden with Obsidian-like features"
author = "Your Name"
keywords = ["blog", "programming", "technology", "digital garden"]

# Social links (shown in footer)
github = "https://www.github.com/yourusername"
mail = "mailto:your.email@example.com"
site = "https://yoursite.com/"

# Social handles (for Twitter Cards)
[params.social]
twitter = "yourusername"
github = "yourusername"

# Open Graph default image (place in static/images/)
# ogImage = "images/og-default.png"

# Site verification (optional)
# [params.verification]
# google = "your-google-verification-code"
# bing = "your-bing-verification-code"

# Analytics (optional)
# [params.analytics]
#   [params.analytics.google]
#     id = "G-XXXXXXXXXX"
#   [params.analytics.plausible]
#     domain = "vitis-demo.netlify.app"
#   [params.analytics.siraaj]
#     apiUrl = "https://siraaj.live"
#     projectId = "vitis"
#     autoTrack = true

# Disqus comments (optional)
# [services]
# [services.disqus]
# shortname = 'your-disqus-shortname'

# UI Strings - Customize all text in the theme
[params.ui]
# Navigation
home = "Home"
posts = "Posts"
series = "Series"
projects = "Projects"
graph = "Graph"
tags = "Tags"

# Homepage
greeting = "Welcome"
recent_posts = "Recent Posts"
view_all = "View All"
knowledge_graph = "Knowledge Graph"
topics = "Topics"
educational_series = "Educational Series"
no_pages_yet = "No pages yet. Start creating content to see your knowledge graph grow!"

# Post/Article
reading_time_singular = "minute read"
reading_time_plural = "minutes read"
share_article = "Share Article"
related_posts = "Related Posts"
previous = "Previous"
next = "Next"
table_of_contents = "Table of Contents"

# Stats
stat_article = "Article"
stat_articles = "Articles"
stat_series = "Series"
stat_tag = "Tag"
stat_tags = "Tags"
stat_page = "Page"
stat_pages = "Pages"
stat_part = "Part"
stat_parts = "Parts"
stat_link = "Link"
stat_links = "Links"

# Graph Page
graph_title = "Knowledge Graph"
graph_description = "Explore the connections between articles and topics"
fullscreen = "Fullscreen"
exit_fullscreen = "Exit Fullscreen"
show = "Show"
all = "All"
pages_only = "Pages Only"
tags_only = "Tags Only"
connected_only = "Connected Only"
search_placeholder = "Search pages and tags..."
zoom_in = "Zoom In"
zoom_out = "Zoom Out"
reset_zoom = "Reset Zoom"
graph_instructions_1 = "Click and drag to move nodes"
graph_instructions_2 = "Use mouse wheel to zoom"
graph_instructions_3 = "Click on a node to visit the page"
graph_instructions_4 = "Use filters to focus on specific types"

# Breadcrumbs
breadcrumb_home = "Home"
breadcrumb_posts = "Posts"

# Series
series_progress = "Series Progress"
series_completed = "Completed"
series_in_progress = "In Progress"
series_view_series = "View Series"
series_part_of = "Part of"

# Related content
[related]
includeNewer = true
threshold = 80
toLower = true
[[related.indices]]
  name = "tags"
  weight = 100
[[related.indices]]
  name = "series"
  weight = 80
[[related.indices]]
  name = "date"
  weight = 10

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "dracula"
  [markup.tableOfContents]
    endLevel = 4
    startLevel = 2

# Privacy (GDPR)
[privacy]
  [privacy.disqus]
    disable = false
  [privacy.googleAnalytics]
    anonymizeIP = true
    respectDoNotTrack = true
  [privacy.x]
    enableDNT = true
  [privacy.youtube]
    privacyEnhanced = true
