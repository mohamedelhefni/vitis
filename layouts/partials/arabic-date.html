<script>
    (function () {
        // English month names
        const englishMonths = [
            "January",
            "February",
            "March",
            "April",
            "May",
            "June",
            "July",
            "August",
            "September",
            "October",
            "November",
            "December",
        ];

        // Get current date or date from data attribute
        const dateElement = document.currentScript.parentElement;
        let date;

        if (dateElement.dataset.date) {
            date = new Date(dateElement.dataset.date);
        } else {
            date = new Date();
        }

        const day = date.getDate();
        const month = englishMonths[date.getMonth()];
        const year = date.getFullYear();

        // Format: day month year (e.g., 15 January 2024)
        const formattedDate = `${day} ${month} ${year}`;

        // Write the date to the document
        document.write(formattedDate);
    })();
</script>
